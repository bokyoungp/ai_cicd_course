name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: settlement-app

jobs:
  test-and-security:
    runs-on: self-hosted
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean previous run artifacts
        run: |
          rm -rf .venv .pytest_cache .ruff_cache .coverage
          find . -type d -name "__pycache__" -exec rm -rf {} + || true

      - name: Set up virtual environment
        run: |
          python${{ matrix.python-version }} -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          pip install -r requirements-dev.txt
          pip install -r requirements.txt

      - name: Run Ruff
        run: |
          source .venv/bin/activate
          ruff check .

      - name: Run Black
        run: |
          source .venv/bin/activate
          black --check .

      - name: Run tests with coverage
        env:
          PYTHONPATH: src
        run: |
          source .venv/bin/activate
          pytest tests/ -v --cov=settlement --cov-report=term-missing --cov-fail-under=80

      - name: Run Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library

  build-and-scan-image:
    needs: test-and-security
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Run Trivy vulnerability scan (image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL
          vuln-type: os,library
